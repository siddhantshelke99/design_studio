<section>
  <p class="eyebrow">Insights</p>
  <h1>Notes From Studio + Academy</h1>

  <div class="post-grid">
    @for (post of posts; track post.title) {
      <article>
        <p>{{ post.tag }}</p>
        <h3>{{ post.title }}</h3>
        <span>{{ post.excerpt }}</span>
      </article>
    }
  </div>
</section>
