<header class="navbar" [class.scrolled]="isScrolled()">
  <a routerLink="/" class="brand" (click)="closeMenu()">
    <img src="/assets/media/whitebglogo.png" alt="HSM" />
    <span>HSM Design</span>
  </a>

  <button class="menu-btn" (click)="toggleMenu()" aria-label="Toggle menu">Menu</button>

  <nav [class.open]="isMenuOpen()">
    @for (link of links; track link.path) {
      <a
        [routerLink]="link.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: link.path === '/' }"
        (click)="closeMenu()"
      >
        {{ link.label }}
      </a>
    }
    <button class="theme-btn" (click)="theme.toggleTheme()">
      {{ theme.isDark() ? 'Light' : 'Dark' }}
    </button>
  </nav>
</header>
