<article class="card">
  <a [routerLink]="['/projects', project.slug]">
    <img [src]="project.cover" [alt]="project.title" loading="lazy" />
    <div class="layer">
      <p>{{ project.category }}</p>
      <h3>{{ project.title }}</h3>
      <span>{{ project.summary }}</span>
    </div>
  </a>
</article>
