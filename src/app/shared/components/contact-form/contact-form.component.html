<form class="contact-form" [formGroup]="form" (ngSubmit)="submit()">
  <label>
    Name
    <input formControlName="name" type="text" placeholder="Your name" />
  </label>
  <label>
    Email
    <input formControlName="email" type="email" placeholder="you@example.com" />
  </label>
  <label>
    Message
    <textarea formControlName="message" rows="5" placeholder="Tell us about your project"></textarea>
  </label>
  <button type="submit" [disabled]="loading()">{{ loading() ? 'Sending...' : 'Send Message' }}</button>
  <p>{{ status() }}</p>
</form>
